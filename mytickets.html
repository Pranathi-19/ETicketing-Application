<!DOCTYPE html>
<html>
<head>
<title>My Tickets</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
background-color: #c9c8d9;
padding: 20px;
}
.table {
background-color: #e6e6e6;
border: 5px solid #C71585;
}
</style>
</head>

<body onload="loadTickets()">

<h2 class="text-center mb-4">My Tickets</h2>

<div class="container">
<table class="table table-bordered text-center">
<thead>
<tr>
<th>Type</th>
<th>Date</th>
<th>Seats</th>
<th>Status</th>
</tr>
</thead>
<tbody id="ticketBody"></tbody>
</table>

<div class="text-end">
<button class="btn btn-success" onclick="checkout()">Checkout</button>
</div>

</div>

<script>
function loadTickets(){

let tickets = JSON.parse(localStorage.getItem("tickets")) || [];
let body = document.getElementById("ticketBody");

body.innerHTML="";

if(tickets.length === 0){
body.innerHTML = `
<tr>
<td colspan="4">No Tickets Booked Yet</td>
</tr>
`;
return;
}

tickets.forEach(ticket=>{
body.innerHTML += `
<tr>
<td>${ticket.type}</td>
<td>${ticket.date}</td>
<td>${ticket.seats}</td>
<td>${ticket.status}</td>
</tr>
`;
});
}

function checkout(){

let tickets = JSON.parse(localStorage.getItem("tickets")) || [];

if(tickets.length === 0){
alert("No tickets available for checkout!");
return;
}

alert("Payment Successful!");
localStorage.removeItem("tickets");

window.parent.frames["content"].location.href="logout.html";
}
</script>

</body>
</html>
