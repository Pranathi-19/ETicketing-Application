<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Book Ticket - BVRIT E-Ticketing</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<!-- Main Content -->
<main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 content-area">

<h2 class="mt-4">Book Ticket</h2>

<form id="bookingForm" class="mt-4">

<div class="mb-3">
<label class="form-label">Ticket Type</label>
<select class="form-select" id="type" required>
<option value="">Select Type</option>
<option>Bus</option>
<option>Train</option>
</select>
</div>

<div class="mb-3">
<label class="form-label">Source</label>
<select class="form-select" id="source" required>
<option value="">Select Source</option>
<option>Hyderabad</option>
<option>Secunderabad</option>
<option>Nizamabad</option>
<option>Delhi</option>
</select>
</div>

<div class="mb-3">
<label class="form-label">Destination</label>
<select class="form-select" id="destination" required>
<option value="">Select Destination</option>
<option>Hyderabad</option>
<option>Secunderabad</option>
<option>Nizamabad</option>
<option>Delhi</option>
</select>
</div>

<div class="mb-3">
<label class="form-label">Travel Date</label>
<input type="date" class="form-control" id="date" required>
</div>

<div class="mb-3">
<label class="form-label">Number of Seats</label>
<input type="number" class="form-control" id="seats" min="1" max="10" required>
</div>

<button type="submit" class="btn btn-success">Book Ticket</button>

</form>

</main>

<footer class="footer text-center mt-5">
© 2024 BVRIT. All rights reserved.<br>
Contact us: info@bvrit.com
</footer>

<script>
document.getElementById("bookingForm").addEventListener("submit", function(e){
e.preventDefault();

let ticket = {
id: "T" + Math.floor(Math.random() * 10000),
type: document.getElementById("type").value,
source: document.getElementById("source").value,
destination: document.getElementById("destination").value,
date: document.getElementById("date").value,
seats: document.getElementById("seats").value,
status: "Booked"
};

let tickets = JSON.parse(localStorage.getItem("tickets")) || [];
tickets.push(ticket);
localStorage.setItem("tickets", JSON.stringify(tickets));

alert("Ticket Booked Successfully!");
window.parent.frames["content"].location.href="mytickets.html";
});
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
