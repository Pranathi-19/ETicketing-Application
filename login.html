<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body {
background-color: #c9c8d9;
display: flex;
justify-content: center;
align-items: center;
height: 100vh;
}
.box {
background-color: #e6e6e6;
padding: 30px;
border-radius: 10px;
width: 100%;
max-width: 400px;
border: 5px solid #C71585;
}
</style>
</head>

<body>

<div class="box">
<h2 class="text-center mb-4">Login</h2>

<form onsubmit="redirectToBooking(event)">
<input type="email" class="form-control mb-3" placeholder="Email" required>
<input type="password" class="form-control mb-3" placeholder="Password" required>
<button class="btn btn-success w-100">Login</button>
</form>
</div>

<script>
function redirectToBooking(event){
event.preventDefault();
alert("Login Successful!");
window.parent.frames["content"].location.href="booking.html";
}
</script>

</body>
</html>
